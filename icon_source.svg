<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2847"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Radar rings -->
  <circle cx="256" cy="270" r="170" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.6"/>
  <circle cx="256" cy="270" r="120" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="270" r="70" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.4"/>
  <!-- Radar crosshair -->
  <line x1="256" y1="90" x2="256" y2="450" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <line x1="76" y1="270" x2="436" y2="270" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <!-- Radar sweep -->
  <path d="M256,270 L256,100 A170,170 0 0,1 403,185 Z" fill="#3b82f6" opacity="0.15"/>
  <!-- Surface vessels (triangles) -->
  <polygon points="200,300 210,280 220,300" fill="#22d3ee" opacity="0.9"/>
  <polygon points="250,310 260,290 270,310" fill="#22d3ee" opacity="0.9"/>
  <polygon points="300,295 310,275 320,295" fill="#22d3ee" opacity="0.9"/>
  <!-- Drone (diamond) -->
  <polygon points="280,210 290,200 300,210 290,220" fill="#a78bfa" opacity="0.9"/>
  <!-- Contact (red dot) -->
  <circle cx="370" cy="180" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="370" cy="180" r="10" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <!-- Title -->
  <text x="256" y="80" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial" font-weight="700" font-size="42" fill="#3b82f6" letter-spacing="8">LOCALFLEET</text>
  <!-- Subtitle -->
  <text x="256" y="470" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial" font-weight="400" font-size="18" fill="#64748b" letter-spacing="4">EDGE C2</text>
</svg>
